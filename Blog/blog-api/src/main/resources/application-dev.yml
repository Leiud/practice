server:
  port: 80

spring:
  # 数据库服务配置
  datasource:
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=GMT%2B8
    driver-class-name: com.mysql.jdbc.Driver
    url: jdbc:mysql://localhost:3306/blog?useUnicode=true&characterEncoding=utf8&useSSL=false
    username: root
    password: root
  # redis服务配置
  redis:
    host: 127.0.0.1
    port: 6379
    timeout: 10000ms
  # 如果选择邮箱提醒方式，则会在收到评论后向填写的邮箱自身发送一封邮件(提醒自己)；如果选择tg，则填写的邮箱只作为提醒访客的发送方
  # 阿里云邮箱，port=25在Windows系统下有效，Linux系统需要改为465并将下面两行取消注释，其它邮箱服务商配置参考关键字"spring mail 服务器"
  mail:
    properties:
      mail:
#        smtp:
#          socketFactory:
#            port: 465
#          ssl:
#            enable: true
        host: smtp.mxhichina.com
        port: 25
        # 邮箱账号
        username:
        # u90AE箱密码
        password:

# mybatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    # 开启驼峰功能
    map-underscore-to-camel-case: true

# 日志配置
logging:
  level:
    root: info
    cn:
      blog:
        api: debug
  file:
    path: blog-api/log
    name: blog-dev

# 博客配置，生产环境需要修改为服务器ip或域名
blog:
  name: My's Blog
  # 后端服务URL
  api: http://localhost:${server.port}
  # 后台管理URL
  cms: http://localhost:8080
  # 前台界面URL
  view: http://localhost:8081

# jwt配置
token:
  # 1000 * 60 * 60 * 24 * 3 三天
  expireTime: 259200000
  # 生产环境务必修改此配置，否则无法保证token安全性
  secretKey: abcdefghijklmnopqrstuvwxyz

# 博主接收评论提醒方式: Telegram=tg 邮箱=mail (访客评论提醒固定为邮箱方式)
comment:
  notify:
    channel: mail
  # 新评论是否默认公开
  default-open: true

# 如果选择邮箱提醒方式，以下可以无需修改
tg:
  bot:
    api: https://api.telegram.org/bot
    # bot的token，可以从 @BotFather 处获取
    token: 1234567890:qwertyuiopasdfghjklzxcvbnm
    # 自己账号和bot的聊天会话id
    chat-id: 1234567890
    # 是否使用代理
    use-proxy: false
    # 是否使用反向代理
    use-reverse-proxy: true
    # 反向代理URL，请自行搭建，示例API随时可能关闭
    reverse-proxy-url: https://tg-api-open.naccl.workers.dev

# 代理配置，如不使用无需修改 (目前用于发送Telegram请求)
http:
  proxy:
    server:
      host: 127.0.0.1
      port: 7890
      timeout: 10000

# 评论中QQ头像存储方式: 本地:local GitHub:github
upload:
  channe;: local
  # 静态文件上传访问路径 Windows环境例如: C:/Users/blog/Desktop/upload/ Linux环境例如：/home/blog/upload/
  file:
    path: /Users/blog/Desktop/upload/
    access:-path: /image/**
    resources-locations: file:${upload.file.path}
  # 如果选择本地上传方式，以下可以无需修改
  # GitHub token 教程见 https://naccl.github.io/PictureHosting/#/pictureHosting/help
  github:
    token: ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
    username: atideas
    # 需要用作图床的GitHub仓库名
    repos: assets
    # 需要上传至仓库的路径 开头需要"/" 结尾不要"/"
    repos-path: /comment/avatar
