server:
  port: 80

eureka:
  client:
    register-with-eureka: false
    service-url:
      # 配置服务中心，OpenFeign 去里面找服务
      defaultZone: http://eureka7001.com:7001/eureka/,http://eureka7002.com:7002/eureka

# 没提示不管它，可以设置
ribbon:
  # 指的是建立连接后从服务器读取到可用资源所用的时间
  ReadTimeout: 5000
  # 指的是建立连接使用的时间，适用于网络状况正常的情况下，两端连接所用的时间
  ConnectTimeout: 5000

# 开启日志的 Feign 客户端
logging:
  level:
    # Feign 日志以什么级别监控哪个接口
    # 写自己的包名
    com.example.springcloud.service.PaymentFeignService: debug
