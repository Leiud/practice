server:
  port: 3377

spring:
  application:
    name: nacos-config-client
  cloud:
    nacos:
      discovery:
        # Nacos 服务注册中心地址，本机的写 localhost
        server-addr: 192.168.30.129:8848
      config:
        # Nacos 作为配置中心地址，本机的写 localhost
        server-addr: 192.168.30.129:8848
        # 指定 yml 格式配置
        file-extension: yaml
        group: DEV_GROUP
        # 命名空间 id
        namespace: dev