server:
  port: 9527

spring:
  application:
    name: cloud-gateway
  cloud:
    gateway:
      discovery:
        locator:
          # 开启从注册中心动态创建路由的功能，利用微服务名称进行路由（默认 false）
          enabled: true
      routes:
        # 路由的 id，没有规定规则但要求唯一，建议配合服务名
        - id: payment_route
          # 匹配后提供服务的路由地址
          # uri+predicates 要访问这个路径得先经过 9527 处理
          # uri: http://localhost:8001
          # lb 属于 GateWay 的关键字，代表是动态 uri，即代表使用的是服务注册中心的微服务名，它默认开启使用负载均衡机制
          # lb://serviceName 是 SpringCloud GateWay 在微服务中自动创建的负载均衡 url
          uri: lb://cloud-payment-service
          predicates:
            # 断言，路径相匹配的进行路由
            - Path=/payment/get/**
        # 路由的 id，没有规定规则但要求唯一，建议配合服务名
        - id: payment_route2
          # 匹配后提供服务的路由地址
          # uri: http://localhost:8001
          uri: lb://cloud-payment-service
          predicates:
            # 断言,路径相匹配的进行路由
            - Path=/payment/lb/**
            # 指定时间后才能访问（After）时间往后写一小时
            # - After=2021-12-29T19:51:00.951916200+08:00[Asia/Shanghai]
            # 带 Cookie，并且 username 的值为 example
            # - Cookie=username,example
            # 请求头要有 X-Request-Id 属性并且值为整数的正则表达式
            # - Header=X-Request-Id, \d+
            # Host: xxx.example.com 请求是 Host 必须有 **.example.com
            # 防爬虫思路，前后端分离的话，只限定前端项目主机访问，这样可以屏蔽大量爬虫
            # - Host=**.example.com
            # 只允许 get 请求访问
            # - Method=GET
            # url 请求地址必须带上 username 参数，并且值必须为整数
            # - Query=username, \d+



# 注册进 eureka Server 网关他本身也是一个微服务，也要注册进注册主中心
eureka:
  instance:
    hostname: cloud-gateway-service
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://eureka7001.com:7001/eureka/