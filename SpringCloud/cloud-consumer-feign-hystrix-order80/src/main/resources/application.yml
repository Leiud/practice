server:
  port: 80

eureka:
  client:
    # register-with-eureka: false
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:7001/eureka

# 设置超时时间
# 默认值
# hystrix.command.default.execution.timeout.enable=true
# 为 false 则超时控制有 ribbon 控制，为 true 则 hystrix 超时和 ribbon 超时都使用，但是谁小谁生效，默认为 true
# 默认值  熔断器的超时时长默认 1 秒，最常修改的参数
# hystrix.command.default.execution.isolation.thread.timeoutInMilliseconds=1000
# 配置 Ribbon 的 超时时长，注意：hystrix 默认自带 ribbon 包
ribbon:
  ReadTimeout: 4000
  ConnectTimeout: 4000

# 用于服务降级 在注解 @FeignClient 中添加 fallback 属性值
feign:
  hystrix:
    enabled: true