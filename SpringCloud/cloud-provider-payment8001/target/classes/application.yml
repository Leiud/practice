# 微服务建议一定要写服务端口号和微服务名称
server:
  # 端口号
  port: 8001

spring:
  application:
    # 微服务名称
    name: cloud-payment-service
  zipkin:
    base-url: http://192.168.83.128:9411
  sleuth:
    sampler:
      # 采样率值介于 0 到 1 之间，1 则表示全部采集（一般不为 1，不然高并发性能会有影响）
      probability: 1
  # 数据库配置
  datasource:
    # 当前数据源操作类型
    type: com.alibaba.druid.pool.DruidDataSource
    # mysql 驱动包，mysql5.x 的没有 cj
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # driver-class-name: com.mysql.jdbc.Driver
    driver-class-name: org.gjt.mm.mysql.Driver
    # 记得先创建数据库
    url: jdbc:mysql://192.168.83.128:3306/springcloud?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: root

# mybatis 配置
mybatis:
  # 配置文件目录
  mapper-locations: classpath:mapper/*.xml
  # 所有 Entity 别名类所在包
  type-aliases-package: com.example.springcloud.entities

eureka:
  client:
    # true 表示向注册中心注册自己，默认为 true
    register-with-eureka: true
    # 是否从 EurekaServer 抓取已有的注册信息，默认为 true。单节点无所谓，集群必须设置为 true才能配合 ribbon 使用负载均衡
    fetch-registry: true
    service-url:
      # 单机
      # defaultZone: http://localhost:7001/eureka
      # 集群
      defaultZone: http://eureka7001.com:7001/eureka, http://eureka7002.com:7002/eureka
  # 重点，和 client 平行
  instance:
    # 每个提供者的 id 不同，显示的不再是默认的项目名
    instance-id: payment8001
    # 可以显示 ip 地址
    prefer-ip-address: true
    # Eureka 客户端向服务端发送心跳的时间间隔，单位秒（默认 30 秒）
    lease-renewal-interval-in-seconds: 1
    # Eureka 服务端在收到最后一次心跳后等待的时间上限，单位秒（默认 90 秒），超时剔除服务
    lease-expiration-duration-in-seconds: 2
