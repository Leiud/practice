# 微服务建议一定要写服务端口号和微服务名称
server:
  # 端口号
  port: 8002

spring:
  application:
    # 微服务名称
    name: cloud-payment-service
  # 数据库配置
  datasource:
    # 当前数据源操作类型
    type: com.alibaba.druid.pool.DruidDataSource
    # mysql 驱动包，mysql5.x 的没有 cj
    # driver-class-name: com.mysql.cj.jdbc.Driver
    # driver-class-name: com.mysql.jdbc.Driver
    driver-class-name: org.gjt.mm.mysql.Driver
    # 记得先创建数据库
    url: jdbc:mysql://192.168.30.129:3306/springcloud?useUnicode=true&characterEncoding=utf-8&useSSL=false
    username: root
    password: root

# mybatis 配置
mybatis:
  # 配置文件目录
  mapper-locations: classpath:mapper/*.xml
  # 所有 Entity 别名类所在包
  type-aliases-package: com.example.springcloud.entities

eureka:
  client:
    # true 表示向注册中心注册自己，默认为 true
    register-with-eureka: true
    # 是否从 EurekaServer 抓取已有的注册信息，默认为 true。单节点无所谓，集群必须设置为 true才能配合 ribbon 使用负载均衡
    fetch-registry: true
    service-url:
      # 单机
      # defaultZone: http://localhost:7001/eureka
      # 集群
      defaultZone: http://eureka7001.com:7001/eureka, http://eureka7002.com:7002/eureka
  # 重点，和 client 平行
  instance:
    # 每个提供者的 id 不同，显示的不再是默认的项目名
    instance-id: payment8002
    # 可以显示 ip 地址
    prefer-ip-address: true