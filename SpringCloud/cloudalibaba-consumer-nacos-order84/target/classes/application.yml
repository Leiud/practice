server:
  port: 84

spring:
  application:
    name: nacos-order-consumer
  cloud:
    nacos:
      discovery:
        # nacos
        server-addr: 192.168.0.103:8848
    sentinel:
      transport:
        # sentinel
        dashboard: 192.168.0.103:8858
        # 默认 8719 端口，假如被占用会自动从 8719 开始依次 +1 扫描,直至找到未被占用的端口
        port: 8719

# 消费者将去访问的微服务名称
server-url:
  nacos-user-service: http://nacos-payment-provider

# 激活 Sentinel 对 Feign 的支持
feign:
  sentinel:
    enabled: true