server:
  port: 83

spring:
  application:
    name: nacos-order-consumer
  cloud:
    nacos:
      discovery:
        # 配置的 Nacos 地址，本机的写localhost:8848
        server-addr: 192.168.30.129:8848

# 消费者要访问的微服务名称（成功注册进 nacos 的服务提供者），在这配置了访问的服务，业务类就不用在定义常量了
service-url:
  nacos-user-service: http://nacos-payment-provider