server:
  port: 3366

spring:
  application:
    name: config-client
  cloud:
    # config 客户端配置
    config:
      # 分支名称
      label: master
      # 配置文件名称   这三个综合：master 分支上的 config-dev.yml 的配置文件
      name: config
      # 读取后缀名称   被读取到 http://config-3344.com:3344/master/config/dev
      profile: dev
      # 配置中心地址
      uri: http://localhost:3344
  rabbitmq:
    # 本机写 localhost，服务器的写服务器地址
    host: 192.168.83.128
    # 客户端和 RabbitMQ 进行通信的端口，RabbitMQ 网页是 15672
    port: 5672
    # 默认是 guest
    username: guest
    # 默认是 guest
    password: guest

eureka:
  client:
    service-url:
      # 服务注册到的 eureka 地址
      defaultZone: http://localhost:7001/eureka

# RabbitMQ 相关配置
management:
  # 暴露 bus 刷新配置的端点
  endpoints:
    web:
      exposure:
        include: 'bus-refresh'