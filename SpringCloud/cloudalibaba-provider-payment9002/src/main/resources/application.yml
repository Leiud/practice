server:
  port: 9002

spring:
  application:
    name: nacos-payment-provider
  cloud:
    nacos:
      discovery:
        # 配置的 Nacos 地址，本机的写 localhost:8848，服务器的写 IP 地址
        # server-addr: 192.168.30.129:8848
        # 换成 nginx 的 80 端口，做集群
        server-addr: 192.168.30.129:80

management:
  endpoints:
    web:
      exposure:
        include: '*'