server:
  port: 7001

eureka:
  instance:
    # eureka 服务端的实例名称
    hostname: eureka7001.com
  client:
    # false 表示不向注册中心注册自己（想注册也可以，不过没必要）
    register-with-eureka: false
    # false 表示自己端就是注册中心，职责就是维护服务实例，并不需要去检索服务
    fetch-registry: false
    service-url:
      # 设置与 eurekaServer 交互的地址查询服务和注册服务都需要依赖这个地址
      # 单机版
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
      # 集群版  相互注册，相互守望
      # defaultZone: http://eureka7002.com:7002/eureka/
    # defaultZone 是固定写法，如果想自定义，需要按以下写法才行：
    # region: eureka-server
    # availability-zones:
      # eureka-server: server1,server2
        # service-url:
          # server1: http://eureka7002.com:7002/eureka/
          # server2: http://eureka7003.com:7003/eureka/
  # 与 client 平行
  server:
    # 关闭自我保护机制，保证不可用该服务被及时剔除，默认为 true
    enable-self-preservation: false
    # 心跳的间隔时间，单位毫秒
    eviction-interval-timer-in-ms: 2000