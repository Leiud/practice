<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<style type="text/css">
.box{
	width:600px;
	border:1px solid #444;
	margin:20px auto;
}
.box .div1{
	width:100px;
	height:100px;
	background-color:red;
}
.box .div2{
	width:100px;
	height:100px;
	background-color:green;
	position:relative;  /*相对定位*/
	left:50px;
	top:50px;
}
.box .div3{
	width:100px;
	height:100px;
	background-color:blue;
}
</style>
</head>

<body>
<div class="box">
	<div class="div1"></div>
	<div class="div2"></div>
	<div class="div3"></div>
</div>
</body>
</html>
