<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<style type="text/css">
.box{
	width:800px;
	margin:0px auto;
	border:1px solid #444;
	background-color:yellow;
	padding:10px;
}
.box .header{
	height:90px;
	margin-bottom:10px;
	background-color:#6600ff;
}
.box .left{
	width:590px;
	height:400px;
	float:left;
	background-color:#009900;
}
.box .right{
	width:200px;
	height:400px;
	float:right;
	background-color:#ff9933;
}
.box .footer{
	height:90px;
	margin-top:10px;
	background-color:#ccc;
}
.clear{clear:both;}
</style>
</head>

<body>
<div class="box">
	<div class="header"></div>
	<div class="left"></div>
	<div class="right"></div>
	<div class="clear"></div>
	<div class="footer"></div>
</div>
</body>
</html>
