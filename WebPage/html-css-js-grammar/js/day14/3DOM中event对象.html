<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
window.onload = function(){
	//获取id=img01的图片对象
	var imgObj = document.getElementById("img01");
	//增加onclick事件
	imgObj.onclick = get_xy; //传地址，不带括号
}
//不能传event参数，但形参必须接收
//第一个形参，一定是event对象。
function get_xy(e)
{
	//获取单击时，相关坐标信息
	var str = "窗口左边距离："+e.clientX+"，窗口顶边距离："+e.clientY;
	str += "\n网页左边距离："+e.pageX+"，网页顶边距离："+e.pageY;
	str += "\n屏幕左边距离："+e.screenX+"，屏幕顶边距离："+e.screenY;
	str += "\n事件类型："+e.type;
	window.alert(str);
}
</script>
</head>

<body style="margin:0px;">
<img src="images/01.jpg" width="400" id="img01" />
</body>
</html>
