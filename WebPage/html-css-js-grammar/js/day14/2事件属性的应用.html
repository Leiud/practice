<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
var imgObj;//全局变量
window.onload = function(){ //复合数据类型，都是传地址
	//获取id=img01的对象
	imgObj = document.getElementById("img01");
	//给图片标记，绑定一个onclick事件属性
	//此时onclick属性一定要全小写。
	imgObj.onclick = changeBig;//引用传址，不带括号
}; 
function changeBig()
{
	//将宽度改为原来的2倍
	imgObj.width = imgObj.width * 2;
}
</script>
</head>
<body>
<img src="images/01.jpg" width="400" id="img01" />
</body>
</html>
