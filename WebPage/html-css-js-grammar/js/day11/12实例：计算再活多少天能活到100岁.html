<title>无标题文档</title>
<script type="text/javascript">
//实例：计算自己再活多少天能活到100岁
//（1）创建当前的日期对象，并取出毫秒值
var timer1 = new Date().getTime();
//（2）创建将来的日期对象，并取出毫秒值
var timer2 = new Date(1990+100,10,24).getTime();
//（3）两个日期相减
var str = (timer2-timer1)/1000/3600/24;
document.write("张三再活"+str+"天，就能活到百岁了！");


</script>
</head>
