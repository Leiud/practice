<title>无标题文档</title>
<script type="text/javascript">
//实例：求两个整数之间的随机整数
//定义随机数的函数
function getRandom(max,min)
{
	//求随机整数
	var random = Math.random()*(max-min)+min;
	//向下取整
	random = Math.floor(random);
	//输出结果
	document.write(random+"<hr>");
}
//调用函数
getRandom(0,10);
getRandom(10,20);
getRandom(20,30);
getRandom(7,91);
</script>
