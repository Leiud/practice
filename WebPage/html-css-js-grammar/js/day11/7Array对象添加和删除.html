<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">

var arr = ["张三","男",30];
document.write("数组长度："+arr.length+"<br>数组的值："+arr+"<hr>");
//删除最后一个元素
var value = arr.pop();
document.write("数组长度："+arr.length+"<br>数组的值："+arr+"<br>返回值："+value+"<hr>");
//删除第一个元素
value = arr.shift();
document.write("数组长度："+arr.length+"<br>数组的值："+arr+"<br>返回值："+value+"<hr>");


</script>
</head>

<body>
</body>
</html>
