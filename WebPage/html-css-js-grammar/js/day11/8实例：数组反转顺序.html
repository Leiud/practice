<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：对以下数组进行反转操作(不使用reverse()方法)
var arr1 = ["a","b","c","d"];
//提前获取数组长度
var len = arr1.length;
//创建一个空的数组
var arr2 = new Array();
//循环数组
for(var i=0;i<len;i++)
{
	arr2[i] = arr1.pop(); 
	/*
		第1次循环   i=0;i<4    ["d"]	
		第2次循环   i=1;i<4    ["d","c"]
		第3次循环   i=2;i<4    ["d","c","b"]
		第4次循环   i=3;i<4    ["d","c","b","a"]
	*/
}
document.write(arr2);


</script>
</head>

<body>
</body>
</html>
