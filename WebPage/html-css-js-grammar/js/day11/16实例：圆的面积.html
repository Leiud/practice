<title>无标题文档</title>
<script type="text/javascript">
//实例：圆的面积
function getArea(r)
{
	var a = Math.PI*r*r;
	a = a.toFixed(2);
	document.write("半径r="+r+"的圆的面积是："+a+"<hr>");
}
getArea(5);
getArea(8);
getArea(10);
</script>
