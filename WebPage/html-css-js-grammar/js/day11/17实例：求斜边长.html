<title>无标题文档</title>
<script type="text/javascript">
//实例：求直角三解形的斜边长
function getLong(a,b)
{
	//定义斜边长的变量
	var c = a*a + b*b
	//开方运算
	c = Math.sqrt(c);
	//输出结果
	document.write("斜边长："+c+"<hr>");
}
getLong(3,4);
getLong(9,12);
</script>
