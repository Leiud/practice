<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//（函数）定义一个函数：求数组中的最大值
var arr = [10,20,30,45,9];
//定义函数
function getMax(arr2)
{
	//假设一个最大值
	var max = arr2[0];
	//循环数组，进行比较
	for(var i=0;i<arr2.length;i++)
	{
		if(max < arr2[i])
		{
			max = arr2[i]; //max=20;max=30;max=45
		}
	}
	document.write("最大值是："+max);
}
//调用函数
getMax(arr);
//（2）第二种做法*******************************************
var arr2 = [10,20,30,45,9]; //全局变量
//定义函数
function getMax2()
{
	//假设一个最大值
	var max = arr2[0];
	//循环数组，进行比较
	for(var i=0;i<arr2.length;i++)
	{
		if(max < arr2[i])
		{
			max = arr2[i]; //max=20;max=30;max=45
		}
	}
	document.write("<hr>最大值是："+max);
}
//调用函数
getMax2();
</script>
</head>

</body>
</html>
