<script type="text/javascript">
//实例：网页随机背景色
var min = 100000;
var max = 999999;
var random = Math.random()*(max-min)+min;
//向下取整
random = Math.floor(random);

//直接查找body对象
/*
	document代表网页对象
	body对象是document对象的子对象
	body对象有一个bgColor的属性
	访问网页中所有的标记的起点是document。
	除了body以外，其它的标记的访问，必须使用id来访问。
*/
document.body.bgColor = "#"+random ;
</script>
