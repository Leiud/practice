<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：输出1-100间所有的偶数，用continue作
for(var i=1;i<=100;i++)
{
	//如果是奇数，if条件为true,则continue。
	//如果是偶数，if条件为false
	if(i%2!=0)
	{
		continue;//终止本次循环，而直接开始下一次循环
		         //continue之后的代码不再执行了。
	}
	document.write(i+" ");// 2 4 6 8
}
</script>
</head>

<body>
</body>
</html>
