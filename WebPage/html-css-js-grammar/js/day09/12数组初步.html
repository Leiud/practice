<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//创建一个数组
var arr = ["张三","男",30,"大专"];
document.write(arr);
document.write("<hr>");
//增加元素只能往后面添加
//往前面增加元素，得使用数组对象的方法(后面再讲)
arr[4] = "北京理工大学";
arr[10] = "山东省"; //添加的下标可以是不连续的
                    //下标4-10之间的下标是存在的，但值为undefined
document.write(arr);
document.write("<hr>");
//删除元素
delete arr[10];//删除的只是元素的值，而下标还有，空间还在
document.write(arr);
</script>
</head>

<body>
</body>
</html>
