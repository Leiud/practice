<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：求1-100间所有偶数的和
/*
	(1)输出1-100间所有的数
	(2)筛选出所有的偶数
	(3)求偶数的和
*/
var sum = 0;
for(var i=1;i<=100;i++)
{
	//如果偶数则输出
	if(i%2==0)
	{
		sum += i; //展开后 sum = sum + i
		/*
			第1次循环  i = 1,
			第2次循环  i = 2,sum = sum +i = 0 + 2
			第3次循环  i = 3,
			第4次循环  i = 4,sum = sum +i = 2 + 4 = 6
			第5次循环  i = 5,
			第6次循环  i = 6,sum = sum +i = 6 + 6 = 12
			……
			sum = 0 + 2 + 4 + 6 = 12
		*/
	}
}
document.write("偶数的和为："+sum);

</script>
</head>

</html>
