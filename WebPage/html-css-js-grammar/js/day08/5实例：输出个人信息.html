<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：输出个人信息
//（1）变量初始化
var name = "周更生";
var sex  = "男";
var age  = 23;
var isMarried = true;
var salary = 2000;
var bonus = 500;
var school = "北京科技大学";
//（2）构建输出的结果
var str = "<h1 style=\"color:red;\">\""+name+"\"的基本信息如下</h1>";
str += "姓名："+name;
str += "<br>性别："+sex;
str += "<br>年龄："+age;
str += "<br>婚否："+(isMarried ? "已婚" : "未婚");
str += "<br>基本工资："+salary;
str += "<br>奖金："+bonus;
str += "<br>实发工资："+(salary+bonus);
//if判断：如果school有值，则输出学校名
//如果school无值，则输出“未填写”
//if的()中只能是布尔型，如果不是布尔值，则要进行类型转换
//undefined转成布尔型为false
str += "<br>毕业院校："+(school ? school : "未填写");
/*
if(school)
{
	str += "<br>毕业院校："+school;
}else
{
	str += "<br>毕业院校：未填写";
}
*/
//（3）输出结果
document.write(str);
</script>
</head>

<body>
</body>
</html>
