<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//根据isMarried的值，来输出是“未婚”，还是“已婚”
var name = "周更生";
var isMarried = false;
//进行条件判断：二选一，不可能同时执行
if(isMarried)
{
	document.write(name+"的婚否状态是：已婚！");
}else
{
	document.write(name+"的婚否状态是：未婚！");
}

//（2）判断两个数谁大谁小
var a = 100;
var b = 10;
//比较运算符的结果也是布尔值
document.write("<hr>");
if(a>b)
{
	document.write(a+"大");
}else
{
	document.write(b+"大");
}
</script>
</head>

<body>
</body>
</html>
