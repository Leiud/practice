<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：输出个人信息
//（1）变量声明，并赋值
var name = "周更生";
var age = 24;
//（2）构建输出的结果
var str = "";
str += "<h1>\""+name+"\"的基本\\信息</h1>";  //展开后 str = str + "abc"=""+"abc"="abc"
str += "姓名："+name;
str += "<br>年龄："+age;
//（3）输出结果
document.write(str);
//弹窗中的换行，只能使用\n来实现；
//而不能使用<br>，只能<body>中的<br>才会解析成换行符
window.alert("HTML超文本标注语言\nCSS层叠样式表\nJavaScript脚本程序");

</script>
</head>
