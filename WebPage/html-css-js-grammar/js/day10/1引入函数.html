<title>无标题文档</title>
<script type="text/javascript">
/*
	(1)求0和5的最大值，
	(2)求10和20的最大值，
	(3)求20和30的最大值,
	(4)求30和40的最大值
	……
*/
//（1）求0和5的最大值
var a = 0;
var b = 5;
if(a>b){
	document.write(a+"大!<br>");
}else
{
	document.write(b+"大!<br>");
}
//（2）求10和20的最大值
var a = 10;
var b = 20;
if(a>b)
{
	document.write(a+"大!<br>");
}else
{
	document.write(b+"大!<br>");
}
//（3）求20和30的最大值
var a = 20;
var b = 30;
if(a>b)
{
	document.write(a+"大!<br>");
}else
{
	document.write(b+"大!<br>");
}
//***************************************************
function getMax(a,b){
	if(a>b)
	{
		document.write(a+"大!<br>");
	}else
	{
		document.write(b+"大!<br>");
	}
}
getMax(0,5);
getMax(10,20);
getMax(20,30);
getMax(30,40);
</script>
