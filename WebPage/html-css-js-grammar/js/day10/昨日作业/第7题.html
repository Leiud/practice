<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//（数组）定义一个数组，并给出6个整数，代表本小组同学的各自年龄，求本小组同学的平均年龄。
/*
	平均 = 和 / 个数
*/
var arr = [1,2,3,4,5,6];
var sum = 0;
var n = arr.length;//动态求数组个数
for(var i=0;i<n;i++)
{
	sum += arr[i]; //展开后     sum = sum + arr[i]
	             /*  第1次循环  sum = sum + arr[0] = 0 + 1 = 1
					 第2次循环  sum = sum + arr[1] = 1 + 2 = 3
					 第3次循环  sum = sum + arr[2] = 3 + 3 = 6
					 0 + 1 + 2 + 3 = 6
				 */
}
document.write("平均值："+sum/n);
</script>
</head>

</body>
</html>
