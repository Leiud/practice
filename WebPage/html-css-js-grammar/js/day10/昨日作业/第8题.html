<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//（数组）定义一个数组，并给出7个整数，求该数组中的最大值和最小值以及各自的下标各为多少？
var arr = [6,2,7,4,9,3,1];
//假设一个最大值
var max = arr[0];
var maxIndex = 0;
//假设一个最小值
var min = arr[0];
var minIndex = 0;
//循环比较
for(var i=0;i<arr.length;i++)
{
	//比较最大值
	if( max < arr[i])
	{
		max = arr[i];
		maxIndex = i;
	}
	//比较最小值
	if(min>arr[i])
	{
		min = arr[i];
		minIndex = i;
	}
}
document.write("最大值："+max+",最大下标："+maxIndex+"<br>最小值："+min+"，最小值下标："+minIndex);


</script>
</head>

</body>
</html>
