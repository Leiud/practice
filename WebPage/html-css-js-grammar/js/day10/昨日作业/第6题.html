<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//（循环，分析）一张纸的厚度是0.01毫米，则该纸对折30次后是多厚（据说超过珠穆朗玛峰的高度）。
//反过来，一张纸对折几次后，就超过1米厚了？
/*
	纸张初始厚度 houdu = 1米
	对折1次     2米     houdu = houdu*2 = 1*2=2
	对折2次     4米     houdu = houdu*2 = 2*2=4
	对折3次     8米     houdu = houdu*2 = 4*2=8
	对折4次     16米    houdu = houdu*2 = 8*2=16
	……
*/
var houdu = 0.01/1000; //将毫米换算成米：1米=1000毫米
for(var i=1;i<=30;i++)
{
	houdu *= 2; //展开后 houdu = houdu * 2;
	//推理过程：用假设的一种思想来解题。
	//假设当前houdu=1，该厚度并没有超过1米
	//因此，再对折1次后，houdu*2=2
	//所以，这个值应介于1到2之间。
	if(houdu>1 && houdu<=2)
	{
		document.write("对折"+i+"次后，超过了1米！"+houdu+"<br>");
	}
}
document.write("对折30次后，厚度为："+houdu+"米！");

</script>
</head>

</body>
</html>
