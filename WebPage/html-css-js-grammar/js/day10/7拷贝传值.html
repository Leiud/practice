<title>无标题文档</title>
<script type="text/javascript">
//（1）拷贝传值：将一个变量的值“拷贝”一份，传给了另一个变量
var a = 10; //声明变量
var b = a;  //将变量a的值“拷贝”一份，赋给变量b
a = 100;    //重新给变量赋值100
alert(b);   //b = 10
alert(a);   //a = 100
</script>
</head>
