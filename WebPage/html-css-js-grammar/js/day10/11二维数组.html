<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//创建一个空的数组
var arr = new Array();
//增加数组元素，数组元素的值可以是任何类型
arr[0] = "张三";
arr[1] = "男";
arr[2] = ["976543234","beijing@126.com","010-8765432"];
//构建输出的结果
var str = "<h2>"+arr[0]+"的基本信息</h2>";
str += "姓名："+arr[0];
str += "<br>性别："+arr[1];
str += "<br>QQ号码："+arr[2][0];
str += "<br>邮箱："+arr[2][1];
str += "<br>电话："+arr[2][2];
//输出结果
document.write(str);
</script>
</head>

<body>
</body>
</html>
