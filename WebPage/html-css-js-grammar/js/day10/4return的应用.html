<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：用函数求两个数的最大值，然后，在函数外将最大值再加100求结果
//定义函数
function getMax(a,b)
{
	if(a>b)
	{
		return a;
	}else
	{
		return b;
	}
}
//调用函数
//如果在函数中直接输出了，那么getMax(10,20)的值是undefined;
//如果在函数中使用return返回了一个20，那么getMax(10,20)的值为20。
//return何时使用呢？当你在函数外需要这个值，只需要return返回。
var max = getMax(10,20);
document.write(max+100);
</script>
</head>

<body>
</body>
</html>
