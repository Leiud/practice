<title>无标题文档</title>
<script type="text/javascript">
//定义函数
function getMax(a,b)
{
	//声明变量
	var max2;
	if(a>b){
		max2 = a;
	}else
	{
		max2 = b;
	}
	//返回max的值，返回函数调用者
	return max2;
}
//调用函数
var max = getMax(10,20);
document.write("最大值为："+max);
