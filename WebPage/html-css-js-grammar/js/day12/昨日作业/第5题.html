<title>无标题文档</title>
<script type="text/javascript">
//（Date）计算自己再活多少天，就能活到100岁？
//创建现在的日期对象，并取出毫秒值
var timer1 = new Date().getTime();
//创建100岁的日期对象，并取出毫秒值
var timer2 = new Date(1990+100,10,25).getTime();
//输出结果
document.write("再活"+Math.ceil((timer2-timer1)/1000/3600/24)+"天，就能活到100岁！");

</script>
