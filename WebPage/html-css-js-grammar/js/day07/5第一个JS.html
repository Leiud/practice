<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//在<body>中输出一句话
window.alert("你看见我的吗？我在这呢？");
document.write("我是被踢出来的！");
document.write("<h1>第38期PHP基础班</h1>");
document.write('<p style="color:blue;">这是我的第一个JS文件。</p>');

//数值型变量：变量的值是数值型的
var a = 10;
var a = 0;
var a = -10;
var a = 0.9;
var b = a *10; //b = a * 10 = 0.9*10 = 9
//同名变量：下面的变量将替换上面的变量
document.write(b);

//（2）字符型变量：用单引号或双引号，引起来的一串字符
var a = "北京传智";
var b = "科技有限公司";
var c = a + b; // c = "北京传智"+"科技有限公司"="北京传智科技有限公司"
//这里的“+”是连接号，而不是“加法”。
document.write(c);
document.write("<hr>");

var a = "10";
//以下代码中，有一个操作数是字符串，因此，将执行字符串的“连接”运算
//所谓“连接”就是将左右两个字符串拼在一起，构成一个更多的字符串
var b = a + 10; // b = a+10="10"+10="10"+"10"="1010"
document.write(b);
document.write("<hr>");

//（1）“+=”的应用
//以下的写法是错误的。
//使用var关键字声明变量，说明变量不存在才进行变量。
var a + = 10;  //展开后  var a = a + 10;
document.write(a);

//（2）“+=”的应用
var a = "10";
a += 20;  //展开后 a = a + 20 = "10"+20 = "10"+"20"="1020"
document.write(a);

</script>
</head>

<body>
</body>
</html>
