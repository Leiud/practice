<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
<script type="text/javascript">
//实例：输出个人信息
//（1）变量初始化
var name = "张三丰";
var sex  = "男";
var age  = 23;
var edu  = "大专";
var school = "北京科技大学";
//（2）构建要输出的结果
var str = "<h1>"+name+"的基本信息如下</h1>";
str += "姓名："+name;  //展开后 str = str + "姓名：张三"
str += "<br>性别："+sex;
str += "<br>年龄："+age;
str += "<br>学历："+edu;
str = str + "<br>毕业院校："+school;
//（3）输出结果
document.write(str);
</script>
</head>

<body>
</body>
</html>
