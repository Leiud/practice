<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			//在加载事件里面给option项目设置双击事件，被双击即移动到对方
			$().ready(function(){
				//双击判断父节点，再做节点跳转
				$('option').dblclick(function(){
					//this分别依次代表每个option节点的dom对象
					if(this.parentNode.id=='hebei'){
						$(this).appendTo($('#shandong'));
					}else{
						$(this).appendTo($('#hebei'));
					}
				});
				
				//一下设置移动到对方后就回不来了
				//$('option').dbclick(function(){
					//this分别依次代表每个option节点的dom对象
				//	if(this.parentNode.id==hebei){
				//		$(this).appendTo($('#shandong'));
				//	}
				//  if(this.parentNode.id==shandong){
				//		$(this).appendTo($('#hebei'));
				//	}
				//});
			});
			function f()
			{
				//左侧“选中”项目移动到右侧
				$('#hebei option:selected').appendTo($('#shandong'));
				
			}
			function s()
			{
				//左侧全部项目移动到右侧
				$('#hebei option').appendTo($('#shandong'));
				
			}
			function m()
			{
				//右侧“选中”项目移动到右侧
				$('#shandong option:selected').appendTo($('#hebei'));
			}
			function n()
			{
				//右侧全部移动到右侧
				$('#shandong option').appendTo($('#hebei'));
			}
		</script>
		<style type="text/css">
			select{width:150px;height:250px;}
		</style>
	</head>
	
	<body>
		<h2>下拉列表项目移动</h2>
		<select id="hebei" multiple="multiple">
			<option value="A">石家庄</option>
			<option value="B">邯郸</option>
			<option value="C">保定</option>
			<option value="D">邢台</option>
		</select>
		<select id="shandong" multiple="multiple">
			<option value="A">济南</option>
			<option value="B">青岛</option>
			<option value="C">泰安</option>
			<option value="D">烟台</option>
		</select>
		<br/>
		<input type="button" value="-->" onclick="f()"/>
		<input type="button" value="==>" onclick="s()"/>
		<input type="button" value="<--" onclick="m()"/>
		<input type="button" value="<==" onclick="n()"/>
	</body>
</html>
