<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//隐藏
				//$().fadeOut([速度毫秒[，回调函数]])
				//回调函数：效果呈现完毕会自动调用函数执行
				$('div').fadeOut(3000,function(){
					alert('消失');
				});
			}
			function s()
			{
				//显示
				//$().fadeIn([速度[，回调函数]])
				//回调函数：效果呈现完毕会自动调用函数执行
				$('div').fadeIn(3000,function(){
					alert('显示');
				});
			}
			function m()
			{
				//开关效果
				//$().fadeToggle(速度时间，回调函数)
				$('div').fadeToggle(2000);
			}
			function n()
			{
				//给div设置指定的透明度
				//$().fadeTo(2000,透明度0-1,回调函数)
				$('#son').fadeTo(2000,0.1);
			}
		</script>
		<style type="text/css">
			div{width:300px;height:200px;background-color:lightgreen;}
			#pat{width:400px;height:300px;background-color:green;}
			#son{width:200px;height:100px;background-color:blue;position:absolute;left:350px;}
		</style>
	</head>
	
	<body>
		<h2>颜色渐变动画效果</h2>
		<div>Today is rain</div>
		<div id="pat"><div id="son">Today is rain</div></div>
		<br/>
		<input type="button" value="隐藏" onclick="f()"/>
		<input type="button" value="显示" onclick="s()"/>
		<input type="button" value="开关" onclick="m()"/>
		<input type="button" value="透明" onclick="n()"/>
	</body>
	</body>
</html>
