<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//隐藏
				//$().slideUp([速度毫秒[，回调函数]])
				//回调函数：效果呈现完毕会自动调用函数执行
				$('div').slideUp(3000,function(){
					alert('消失');
				});
			}
			function s()
			{
				//显示
				//$().slideDown([速度[，回调函数]])
				//回调函数：效果呈现完毕会自动调用函数执行
				$('div').slideDown(3000,function(){
					alert('显示');
				});
			}
			function m()
			{
				//开关效果
				//$().slideToggle(速度时间，回调函数)
				$('div').slidetoggle(2000);
			}
			$(function(){
				setInterval("m()",500);
			})
		</script>
		<style type="text/css">
			div{width:300px;height:200px;background-color:lightgreen;}
		</style>
	</head>
	
	<body>
		<h2>动画效果</h2>
		<div>Today is rain</div>
		<br/>
		<input type="button" value="隐藏" onclick="f()"/>
		<input type="button" value="显示" onclick="s()"/>
		<input type="button" value="开关" onclick="m()"/>
	</body>
	</body>
</html>
