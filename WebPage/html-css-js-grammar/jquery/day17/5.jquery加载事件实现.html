<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			//each遍历方法
			//遍历数组
			//for循环
			//$.each(数组，function(每个元素的下标k,每个元素的值v))
			var color=['gold','yellow','orange','blue'];
			$.each(color,function(k,v){
				//遍历的主体实现
				console.log(k+"---"+v);
			});
			//遍历对象（获得各个成员）
			var cat={name:"kikty",color:"white",climb:function(){console.log('会爬树')}};
			$.each(cat,function(k,v){
				//遍历的主体实现
				console.log(k+"---"+v);
			});
			var clr=['red','blue','pink','purple','yellow','orange','gray'];
			window.onload=function(){
				//遍历jquery对象
				//$().each(function(dom对象下标k,dom对象v))
				$('li').each(function(k,v){
					console.log(k+"---"+v);
				
					//this关键字在当前位置代表每个li的dom对象
					//在jquery内部使用this的时候,它代表dom对象
					console.log(this);
				
					this.style.color="purple";
					$(this).css('background-color',clr[Math.random()*7]);//dom对象  变成  jquery对象了
				
					//v.style.color="blue";
					//$(v).css('background-color','lightblue');//dom对象  变成  jquery对象了
				
				});
			}
			
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2>each遍历方法</h2>
		<ul>
			<li>石家庄</li>
			<li>郑州</li>
			<li>济南</li>
			<li>西安</li>
		</ul>
		<br/>
		<input type="button" value="触发1" onclick="f()"/>
	</body>
</html>
