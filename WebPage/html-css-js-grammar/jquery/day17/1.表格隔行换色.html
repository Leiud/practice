<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			window.onload=function(){
				$('tr:first').css('background-color','yellow');
				$('tr:gt(0):odd').css('background-color','lightblue');
			}
			function cont(){
				//通过控制器复选框控制其他复选框的选中状态
				var b=$('#ct').attr('checked');//判断选中状态
				console.log(b);
				$('.goods').attr('checked','b');//其他复选框状态设置
			}
		</script>
		<style type="text/css">
			table{
				width:700px;
				margin:auto;
				border:1px solid black;
				border-collapse:collapse;
			}
			td{
				border:1px solid black;
			}
			h2{
				width:700px;
				margin:auto;
				text-align:center;
			}
		</style>
	</head>
	
	<body>
		<h2>表格隔行换色</h2>
		<table>
			<tr>
				<td><input type="checkbox" id="ct" onClick="cont()"/></td>
				<td>序号</td>
				<td>名称</td>
				<td>价格</td>
				<td>数量</td>
			</tr>
			<tr>
				<td><input type="checkbox" class="goods"/></td>
				<td>1</td>
				<td>apple</td>
				<td>6100</td>
				<td>13</td>
			</tr>
			<tr>
				<td><input type="checkbox" class="goods"/></td>
				<td>2</td>
				<td>nokia</td>
				<td>2300</td>
				<td>15</td>
			</tr>
			<tr>
				<td><input type="checkbox" class="goods"/></td>
				<td>3</td>
				<td>htc</td>
				<td>2500</td>
				<td>28</td>
			</tr>
			<tr>
				<td><input type="checkbox" class="goods"/></td>
				<td>4</td>
				<td>heimei</td>
				<td>3100</td>
				<td>15</td>
			</tr>
			<tr>
				<td><input type="checkbox" class="goods"/></td>
				<td>5</td>
				<td>samsung</td>
				<td>4600</td>
				<td>41</td>
			</tr>
		</table>
	</body>
</html>
