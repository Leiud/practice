<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//获得全部的被选中的复选框节点对象
				//遍历全部的被选中复选框
				//如果被选中则获得其value值
				var s="";
				for(var i=0;i<$('.hby:checked').length;i++)
				{
					s+=$('.hby:checked:eq('+i+')').val()+",";//1,3,4
				}
				s=s.substr(0,s.length-1);
				console.log(s);
			}
			function s()
			{
				//设置 篮球  棒球选中
				//获得全部复选框，做遍历，判断value值是否等于1，4
				//等于就选中
				//$(全部复选框).val([元素值，元素值])  可设置value值=元素值的项目选中
				$('.hby').val([1,4]);
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2>表单域选中选择器</h2>
		爱好：
		<input type="checkbox" class="hby" name="hobby" value="1"/>篮球
		<input type="checkbox" class="hby" name="hobby" value="2"/>足球
		<input type="checkbox" class="hby" name="hobby" value="3"/>排球
		<input type="checkbox" class="hby" name="hobby" value="4"/>棒球
		<br/>
		<input type="button" value="获取" onclick="f()"/>
		<input type="button" value="设置" onclick="s()"/>
	</body>
</html>
