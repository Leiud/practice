<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//first:第一个   last:最后一个
				$('li:first').css('color','blue');
				$('li:last').css('color','green');
				//eq(下标索引码)  equal的意思  下标索引值从0开始
				$('li:eq(3)').css('color','red');
				//gt(索引号)  great than  节点索引值 大于 某个范围
				//lt(索引号)  less than  节点索引值 小于 某个范围
				$('li:gt(5)').css('background-color','pink');
				$('li:lt(3)').css('background-color','orange');
				//even:匹配到下标索引值为偶数的节点
				//odd:匹配到下标索引值为奇数的节点
				$('li:even').css('background-color','lightgreen');
				$('li:odd').css('background-color','lightblue');
				//not(selector选择器）  去除某个节点
				$('li:not(#yun)').css('color','blue');
				
				
				//$(h1,h2,h3,h4)
				$(':header').css('background-color','yellow');
				//获得标题标签元素  并且有class="pear"属性值
				$(':header.pear').css('color','red');
				//获得张飞  赵云  孙权
				//每个选择器使用前，已获得的下标值要归位（归零）
				$('li:gt(1):lt(3)').css('color','purple');
				//多个并且关系的选择器，没有先后之分，但要避免歧义
				$('li.pear').css('background-color','purple');
				//$('.pealli').css('background-color','orange');  有歧义
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h1>并且选择器1</h1>
		<h2>并且选择器2</h2>
		<h3 class="pear">并且选择器3</h3>
		<h4 class="pear">并且选择器4</h4>
		<ul>
			<li>刘备</li>
			<li>关羽</li>
			<li>张飞</li>
			<li id="yun">赵云</li>
			
			<li>孙权</li>
			<li class="pear">小乔</li>
			<li class="pear">周瑜</li>
			<li>黄盖</li>
			<li>大乔</li>
		</ul>
		<input type="button" value="触发" onclick="f()"/>
	</body>
</html>
