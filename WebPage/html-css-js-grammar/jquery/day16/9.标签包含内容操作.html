<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//获取
				//html()字符串和html标签都可以获取
				console.log($('div').html());
				//text()只能获取字符串
				console.log($('div').text());
			}
			function s()
			{
				//设置
				//html(内容)  字符串和html标签都可以设置
				$('div').html('请访问：<a href="http://www.baidu.com">百度</a>');
				//text(内容)  最好只设置字符串
				//设置<>会变成实体    <:&lt  >:&gt
				$('div').text('请访问：<a href="http://www.baidu.com">百度</a>');
			}
		</script>
		<style type="text/css">
			.apple{width:300px;height:200px;background-color:pink}
			.pear{color:blue}
			.banana{font-size:30px}
		</style>
	</head>
	
	<body>
		<h2>标签包含内容操作</h2>
		<div>Today we are <span>study</span> Jquery</div>
		<br/>
		<input type="button" value="获取" onclick="f()"/>
		<input type="button" value="删除class属性值" onclick="r()"/>
		<input type="button" value="设置" onclick="s()"/>
	</body>
</html>
