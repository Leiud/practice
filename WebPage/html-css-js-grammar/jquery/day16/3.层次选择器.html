<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//$(s1 s2)派生选择器  不考虑层次
				$('div span').css('color','blue');//刘备 阿斗 关羽
				//$(s1>s2)直接子元素选择器
				$('div>span').css('color','lightgreen');//刘备 关羽
				//$(s1+s2) 紧紧挨着的第一个兄弟选择器
				$('div+span').css('color','yellow');//吕布 周瑜
				//$(s1~s2)s1后续全部兄弟关系的s2节点
				$('div~span').css('background-color','purple');//吕布 貂蝉 周瑜 孙权
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2 id="h2">层次选择器</h2>
		<div>
			<span>刘备</span>
			<p><span>阿斗</span></p>
			<span>关羽</span>
		</div>
		<span>吕布</span>
		<span>貂蝉</span>
		<div>董卓</div>
		<span>周瑜</span>
		<p>黄盖</p>
		<span>孙权</span>
		<input type="button" value="触发" onclick="f()"/>
	</body>
</html>
