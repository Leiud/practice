<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//获取被选中的下拉列表的value值
				//适合单选
				console.log($('option:selected').val());
				//多选(同样适合单选)
				console.log($('select').val());
				
			}
			function s()
			{
				//设置 
				//$('下拉列表')。val([元素值，元素值...]);
				//设置value=元素值选中
				$('#city').val(['A']);
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2>下拉列表操作</h2>
		曾经旅游过的城市
		<!--多选：multiple="multiple"-->
		<select id="city">
			<option value="0">=请选择=</option>
			<option value="A">北京</option>
			<option value="B">天津</option>
			<option value="C">上海</option>
			<option value="D">深圳</option>
			<option value="E">沈阳</option>
		</select>
		<br/>
		<input type="button" value="获取" onclick="f()"/>
		<input type="button" value="设置" onclick="s()"/>
	</body>
</html>
