<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//获取被选中的单选按钮的value值
				console.log($('.sx:checked').val());
				
			}
			function s()
			{
				//设置 
				//$('单选按钮')。val([元素值]);
				//设置value=元素值选中
				$('.sx').val(['c']);
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2>单选按钮操作</h2>
		性别：
		<input type="radio" class="sx" name="sex" value="a"/>男
		<input type="radio" class="sx" name="sex" value="b"/>女
		<input type="radio" class="sx" name="sex" value="c"/>保密
		<br/>
		<input type="button" value="获取" onclick="f()"/>
		<input type="button" value="设置" onclick="s()"/>
	</body>
</html>
