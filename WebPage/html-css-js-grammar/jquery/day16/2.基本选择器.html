<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//$('#id')
				$('#useremail').css('color','blue');
				//$('标签名称')
				$('h2').css('background-color','pink');
				$('input').css('width','500px');//获得多个input框
				//$('.class')
				$('.apple').css('background-color','lightgreen');
				//$('*')  通配符选择器:获得页面上所有节点
				//$('*').css('background-color','gray');
				//$(s1 s2 s3)  selector选择器，联合选择器
				//把符合s1 s2 s3的节点全部找到
				$('h2,#usertel,#userqq').css('background-color','purple');
				
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2 id="h2">开始学习jquery</h2>
		<input type="text" id="username" value="linked"/><br/>
		<input type="text" id="useremail" value="linked@gmail.com"/><br/>
		<input type="text" class="apple" id="usertel" value="12351285521"/><br/>
		<input type="text" class="peal" id="userqq" value="77452"/><br/>
		<input type="button" value="触发" onclick="f()"/>
	</body>
</html>
