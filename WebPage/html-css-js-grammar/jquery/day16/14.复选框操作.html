<html>
	<head>
		<title>新建网页</title>
		<meta http-equiv="Content-type" content="text/html;charset=utf-8"/>
		<script type="text/javascript" src="jquery-3.2.1.js"></script>
		<script type="text/javascript">
			function f()
			{
				//全选
				$('.hby').attr('checked',true);
				//以上css()/attr()方法都有批量处理的效果
				//在jquery框架里大部分方法本身有“遍历机制”
				//遍历的同时会为每个dom对象设置对应的css属性
				
			}
			function s()
			{
				//全不选
				$('.hby').attr('checked',false);
			}
			function r()
			{
				//反选
				//遍历全部复选框，查看选中状态，选中设置不选中
				for(var i=0;i<$('.hby').length;i++)
				{
					var flag=$('.hby:eq('+i+')').attr('checked');
					$('.hby:eq('+i+')').attr('checked','!flag');
				}
			}
		</script>
		<style type="text/css">
		</style>
	</head>
	
	<body>
		<h2>复选框操作</h2>
		爱好：
		<input type="checkbox" class="hby" name="hobby" value="1"/>篮球
		<input type="checkbox" class="hby" name="hobby" value="2"/>足球
		<input type="checkbox" class="hby" name="hobby" value="3"/>排球
		<input type="checkbox" class="hby" name="hobby" value="4"/>棒球
		<br/>
		<input type="button" value="全选" onclick="f()"/>
		<input type="button" value="全不选" onclick="s()"/>
		<input type="button" value="反选" onclick="r()"/>
	</body>
</html>
