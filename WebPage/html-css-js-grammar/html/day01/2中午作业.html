<html>
<head>
	<title>HTML文本修改标记的应用</title>
	<meta http-equiv="content-type" content="text/html;charset=utf-8">
</head>
<body>
<font size="7" color="blue">赠汪伦</font><sub>-李白</sub><br><br>
<b>李白乘舟将欲行，</b><br>
<font size="5" color="orange">忽闻岸上踏歌声。</font><br>
<font color="#808080"><i>桃花潭水深千尺，</i></font><br>
<u><font color="red">不及汪伦送我情。</font></u>
</body>
</html>
