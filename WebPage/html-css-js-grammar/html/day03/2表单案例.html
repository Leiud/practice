<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
</head>

<body>

<form name="form1" method="get" action="register.php">
<table width="600" align="center" border="1" bordercolor="#f0f0f0" rules="all" cellpadding="5">
	<tr>
		<td width="100" align="right">用户名：</td>
		<td><input type="text" name="username" /></td>
	</tr>
	<tr>
		<td align="right">密码：</td>
		<td><input type="password" name="userpwd" /></td>
	</tr>
	<tr>
		<td align="right">性别：</td>
		<td>
			<input type="radio" name="sex" value="男" checked="checked" />男
			<input type="radio" name="sex" value="女" />女
		</td>
	</tr>
	<tr>
		<td align="right">兴趣爱好：</td>
		<td>
			<input type="checkbox" name="like" value="游戏" checked="checked" />游戏
			<input type="checkbox" name="like" value="杀人" />杀人
			<input type="checkbox" name="like" value="放火" />放火
			<input type="checkbox" name="like" value="看书" />看书<br>
			<input type="checkbox" name="like" value="游戏" />游戏
			<input type="checkbox" name="like" value="杀人" />杀人
			<input type="checkbox" name="like" value="放火" />放火
			<input type="checkbox" name="like" value="看书" checked="checked" />看书
		</td>
	</tr>
	<tr>
		<td align="right">学历：</td>
		<td>
			<select name="edu">
				<option value="初中">初中</option>
				<option value="高中">高中</option>
				<option value="大专" selected="selected">大专</option>
				<option value="大本">大本</option>
				<option value="研究猪">研究生</option>
			</select>
		</td>
	</tr>
	<tr>
		<td align="right">自我介绍：</td>
		<td><textarea name="intro" cols="50" rows="10">默认文本</textarea></td>
	</tr>
	<tr>
		<td>&nbsp;</td>
		<td>
			<input type="submit" value="提交表单" />
			<input type="reset" value="重新填写" />
			<input type="image" src="images/btn02.png" />
			<input type="button" onclick="javascript:window.close()" value="关闭窗口" />
		</td>
	</tr>
</table>
</form>

</body>
</html>
