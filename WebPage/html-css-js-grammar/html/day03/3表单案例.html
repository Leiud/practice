<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
<title>无标题文档</title>
</head>

<body>
<form name="form1" method="post" action="login.php" enctype="multipart/form-data">
<table width="600" border="1" bordercolor="#f0f0f0" align="center" cellpadding="5" rules="all">
	<tr>
		<td width="100" align="right">用户名：</td>
		<td><input type="text" name="username" /></td>
	</tr>
	<tr>
		<td align="right">密码：</td>
		<td><input type="password" name="userpwd" /></td>
	</tr>
	<tr>
		<td align="right">性别：</td>
		<td>
			<input type="radio" name="sex" value="男" />男
			<input type="radio" name="sex" value="女" checked="checked" />女
		</td>
	</tr>
	<tr>
		<td align="right">籍贯：</td>
		<td>
			<select name="city" style="width:100px;">
				<option value="北京市">北京市</option>
				<option value="天津市">天津市</option>
				<option value="重庆市" selected="selected">重庆市</option>
			</select>
		</td>
	</tr>
	<tr>
		<td align="right">上传头像：</td>
		<td><input type="file" name="uploadFile" /></td>
	</tr>
	<tr>
		<td>&nbsp;</td>
		<td>
			<input type="submit" value="提交表单" />
			<input type="reset" value="重新填写" />
			<input type="hidden" name="id" value="1263" />
		</td>
	</tr>
</table>
</form>
</body>
</html>
