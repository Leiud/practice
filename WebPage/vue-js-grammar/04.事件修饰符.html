<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <script src="./lib/vue.js"></script>
    <style>
        .inner{
            height: 150px;
            background-color: darkcyan;
        }
    </style>
</head>
<body>
    <div id="app" @click="divHandler">

        <!-- .stop 阻止冒泡 -->
        <div class="inner">
            <input type="button" value="戳它" @click.stop="btnHandler">
        </div>
        
        <!-- .prevent 阻止默认行为 -->
        <div>
            <a href="http://www.baidu.com" @click.prevent="linkClick">百度一下，你就知道！</a>
        </div>
    
        <!-- .capture 捕获触发行为 -->
        <div class="inner">
            <input type="button" value="戳它" @click.capture="btnHandler">
        </div>

        <!-- .self 只有点击当前元素才会触发事件处理函数 -->
        <!-- 与.stop相比，.self阻止冒泡时，只会阻止自己身上的冒泡行为的触发，并不会真正阻止冒泡的行为 -->
        <div class="inner">
            <input type="button" value="戳它" @click.self="btnHandler">
        </div>

        <!-- .once 只触发一次事件处理函数 -->
        <div>
            <a href="http://www.baidu.com" @click.prevent.once="linkClick">百度一下，你就知道！</a>
        </div>
    </div>

    <script>
        //创建 Vue 实例，得到 ViewModel
        var vm = new Vue({
            el: '#app',
            data: {
                
            },
            methods: {
               divHandler(){
                   console.log('触发了 inner div 点击事件');
               } ,
               btnHandler(){
                console.log('触发了 btn按钮 点击事件');
               },
               linkClick(){
                console.log('触发了 链接 点击事件');
               },
            },
        });
    </script>
</body>
</html>
