<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <!-- 1. 导入Vue包 -->
    <script src="./lib/vue.js"></script>
</head>
<body>
    <!-- 2. 创建一个要控制的区域 -->
    <div id="app">
        <input type="button" value="浪起来" @click="lang">
        <input type="button" value="低调" @click="stop">
    
        <h4>{{ msg }}</h4>
    </div>

    <script>
        var vm = new Vue({
            el: '#app',
            data: {
               msg: '猥琐发育，别浪~~！',
               intervalId:null,//定义定时器Id
            },
            //在VM实例中，要想获取 data 上的数据，或者想要调用 methods 中的方法，必须通过 this.数据属性名 或 this.方法名 来访问，这里的 this 表示 new 出来的 VM 实例对象
            methods: {
                lang(){
                    // VM 实例会监听自己身上 data 中所有数据的改变，只要数据一发生变化，就会自动把 最新的数据 从 data 上同步到页面中去
                    //好处：程序员只需要关心数据，不需要考虑如何重新渲染DOM页面

                    if(this.intervalId!=null){
                        return;
                    }

                    // ()=>{} 将 this 传入 {} 中，使之在 {} 里能够使用 this
                    this.intervalId = setInterval( () =>{
                        // 获取到头的第一个字符
                        var start = this.msg.substring(0,1);
                        // 获取后面的所有字符
                        var end = this.msg.substring(1);
                        //重新拼接得到新的字符串并赋值给 this。msg
                        this.msg = end + start;
                    },400)
                },
                stop(){
                    clearInterval(this.intervalId);
                    // 每当清除了定时器之后，需要重新把 intervalId 置为 null
                    this.intervalId = null;
                }
            },
            
        })



        // 分析
        // 1. 给【浪起来】按钮绑定一个点击事件
        // 2. 在按钮的事件处理函数中，写相关的业务逻辑代码：拿到msg字符串，然后调用字符串的substring方法来进行字符串截取操作，把第一个字符截取出来
        // 3. 为了实现点击按钮，自动截取，需把步骤2中的代码放到一个定时器中
    </script>
</body>
</html>
