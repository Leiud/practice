<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
    <!-- 1. 导入Vue的包 -->
    <script src="./lib/vue.js"></script>
</head>

<body>
    <!-- 将来 new 的Vue实例 -->
    <!-- Vue实例控制的这个元素区域就是 V -->
    <div id="app">
        <!-- 插值表达式 -->
        <p>{{ msg }}</p>
    </div>
    <script>
        // 2. 创建一个Vue实例
        //当我们导入包之后，在浏览器的内存中，就多了一个Vue构造函数
        // new 出来的这个 vm 对象就是MVVM中的 VM调度者
        var vm = new Vue({
            el: '#app',//表示当前我们new的这个Vue实例要控制页面上的哪个区域
            //data就是 MVVM 中的 M ，专门用来保存每个页面的数据的
            data: {
                //data属性中存放的是el中要用到的数据
                //通过Vue提供的指令，很方便的就能把数据渲染到页面上，不用在手动操作DOM元素【前端的Vue之类的框架，不需要我们去手动操作DOM元素
                msg: '欢迎学习Vue!!!!!!'
            },
        })
    </script>
</body>

</html>
